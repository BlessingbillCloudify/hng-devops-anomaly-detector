events {}

http {
    # This defines the JSON format your detector will read
    log_format json_analytics escape=json '{'
        '"source_ip": "$remote_addr", '
        '"timestamp": "$time_iso8601", '
        '"method": "$request_method", '
        '"path": "$request_uri", '
        '"status": "$status", '
        '"response_size": "$body_bytes_sent"'
    '}';

    server {
        listen 80;

        # This tells Nginx to write logs to our shared volume in JSON
        access_log /var/log/nginx/hng-access.log json_analytics;

        location / {
            proxy_pass http://nextcloud:80; # Send traffic to Nextcloud
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
