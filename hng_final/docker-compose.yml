version: '3'

services:
  nextcloud:
    image: kefaslungu/hng-nextcloud # The specific image the task required
    container_name: nextcloud
    restart: always

  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - HNG-nginx-logs:/var/log/nginx # This connects to the shared volume
    depends_on:
      - nextcloud

volumes:
  HNG-nginx-logs:
    external: true # Tells Docker to use the volume we created in Step 3
